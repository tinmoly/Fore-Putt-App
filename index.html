<script>

const DISTANCES=[2,3,4,5,6,7,8,9,10,12,15,18,20,25,30]
const PGA_TOUR_BASE_AVG={2:99,3:96,4:88,5:77,6:66,7:58,8:50,9:45,10:40,12:33,15:23,18:18,20:15,25:11,30:7}
const PGA_TOUR_AVG=buildPgaTourAverage()
const MANUAL_STATS_KEY="puttingStats"
const MANUAL_STREAKS_KEY="puttingStreaks"
const MANUAL_BEST_STREAKS_KEY="puttingBestStreaks"
const RANDOM_STATE_KEY="puttingRandomState"
const SESSIONS_KEY="puttingSessions"

let appMode="manual"
let manualCurrentDistance=2
let randomCurrentDistance=2

let stats
let streaks
let bestStreaks
let randomState
let sessions

let manualPuttHistory=[]
let randomPuttHistory=[]

const $=(id)=>{
 const el=document.getElementById(id)
 if(!el)throw new Error(`Missing DOM element: ${id}`)
 return el
}

let tapLocked=false
const TAP_DELAY=300

function withTapLock(fn){if(tapLocked)return;tapLocked=true;fn();setTimeout(()=>tapLocked=false,TAP_DELAY)}
function flash(cls){document.body.classList.add(cls);setTimeout(()=>document.body.classList.remove(cls),150)}
function haptic(ms){if(navigator.vibrate)navigator.vibrate(ms)}

function getStreakEmojis(v){if(v>=10)return"Flaming Streak";if(v>=7)return"Hot Streak";if(v>=5)return"Strong Streak";if(v>=3)return"Building Streak";if(v>=1)return"Streak";return"Streak"}

function buildPgaTourAverage(){
 const projected={...PGA_TOUR_BASE_AVG}

 DISTANCES.forEach(distance=>{
  if(projected[distance]!==undefined)return

  const lower=[...Object.keys(PGA_TOUR_BASE_AVG)].map(Number).filter(v=>v<distance).sort((a,b)=>b-a)[0]
  const upper=[...Object.keys(PGA_TOUR_BASE_AVG)].map(Number).filter(v=>v>distance).sort((a,b)=>a-b)[0]

  if(lower===undefined||upper===undefined)return

  const lowerValue=PGA_TOUR_BASE_AVG[lower]
  const upperValue=PGA_TOUR_BASE_AVG[upper]
  const ratio=(distance-lower)/(upper-lower)

  projected[distance]=Math.round(lowerValue+((upperValue-lowerValue)*ratio))
 })

 return projected
}

function defaultStats(){
 const output={}
 DISTANCES.forEach(d=>output[d]={made:0,missed:0,missDir:{shortLeft:0,longRight:0,longLeft:0,shortRight:0}})
 return output
}

function normalizeStatEntry(entry){
 return {
  made:entry?.made||0,
  missed:entry?.missed||0,
  missDir:{
   shortLeft:entry?.missDir?.shortLeft||0,
   longRight:entry?.missDir?.longRight||0,
   longLeft:entry?.missDir?.longLeft||0,
   shortRight:entry?.missDir?.shortRight||0
  }
 }
}

function deepCopy(value){
 return JSON.parse(JSON.stringify(value))
}

function randomSummaryDefaults(){
 return {made:0,missed:0,streak:0,bestStreak:0}
}

function randomStateDefaults(){
 return {
  currentDistance:pickRandomDistance(),
  stats:defaultStats(),
  summary:randomSummaryDefaults()
 }
}

function pickRandomDistance(){
 return DISTANCES[Math.floor(Math.random()*DISTANCES.length)]
}

function currentDistanceValue(){
 return appMode==="manual"?manualCurrentDistance:randomCurrentDistance
}

function loadStats(){
 try{
  const saved=JSON.parse(localStorage.getItem(MANUAL_STATS_KEY))||{}
  const normalized=defaultStats()
  DISTANCES.forEach(d=>normalized[d]=normalizeStatEntry(saved[d]))
  return normalized
 }catch{
  return defaultStats()
 }
}

function saveStats(){
 localStorage.setItem(MANUAL_STATS_KEY,JSON.stringify(stats))
}

function loadStreaks(){
 try{
  const saved=JSON.parse(localStorage.getItem(MANUAL_STREAKS_KEY))||{}
  const output={}
  DISTANCES.forEach(d=>output[d]=saved[d]||0)
  return output
 }catch{
  const output={}
  DISTANCES.forEach(d=>output[d]=0)
  return output
 }
}

function saveStreaks(){
 localStorage.setItem(MANUAL_STREAKS_KEY,JSON.stringify(streaks))
}

function defaultBestStreaks(){
 const output={}
 DISTANCES.forEach(d=>output[d]=0)
 return output
}

function loadBestStreaks(){
 try{
  const saved=JSON.parse(localStorage.getItem(MANUAL_BEST_STREAKS_KEY))||{}
  const output=defaultBestStreaks()
  DISTANCES.forEach(d=>output[d]=saved[d]||0)
  return output
 }catch{
  return defaultBestStreaks()
 }
}

function saveBestStreaks(){
 localStorage.setItem(MANUAL_BEST_STREAKS_KEY,JSON.stringify(bestStreaks))
}

function loadRandomState(){
 try{
  const saved=JSON.parse(localStorage.getItem(RANDOM_STATE_KEY))||{}
  const state=randomStateDefaults()
  state.currentDistance=DISTANCES.includes(saved.currentDistance)?saved.currentDistance:state.currentDistance
  DISTANCES.forEach(d=>state.stats[d]=normalizeStatEntry(saved.stats?.[d]))
  state.summary.made=saved.summary?.made||0
  state.summary.missed=saved.summary?.missed||0
  state.summary.streak=saved.summary?.streak||0
  state.summary.bestStreak=saved.summary?.bestStreak||0
  return state
 }catch{
  return randomStateDefaults()
 }
}

function saveRandomState(){
 localStorage.setItem(RANDOM_STATE_KEY,JSON.stringify(randomState))
}

function loadSessions(){
 try{
  return JSON.parse(localStorage.getItem(SESSIONS_KEY))||[]
 }catch{
  return []
 }
}

function saveSessions(){
 localStorage.setItem(SESSIONS_KEY,JSON.stringify(sessions))
}

function resetCurrentTracking(){
 stats=defaultStats()
 streaks={}
 DISTANCES.forEach(d=>streaks[d]=0)
 bestStreaks=defaultBestStreaks()
 manualPuttHistory=[]
 manualCurrentDistance=DISTANCES[0]
 saveStats()
 saveStreaks()
 saveBestStreaks()
}

function resetRandomTracking(){
 randomState=randomStateDefaults()
 randomCurrentDistance=randomState.currentDistance
 randomPuttHistory=[]
 saveRandomState()
}

function clearAllTracking(){
 sessions=[]
 saveSessions()
 resetCurrentTracking()
 resetRandomTracking()
}

function recomputeStreakStateFromHistory(){
 const current=loadStreaks()
 const best=defaultBestStreaks()

 DISTANCES.forEach(d=>current[d]=0)

 manualPuttHistory.forEach(putt=>{
  if(putt.type==="made"){
   current[putt.distance]=(current[putt.distance]||0)+1
   if(current[putt.distance]>best[putt.distance])best[putt.distance]=current[putt.distance]
   return
  }

  if(putt.type==="missed")current[putt.distance]=0
 })

 streaks=current
 bestStreaks=best
}

function recomputeRandomStateFromHistory(){
 const rebuiltStats=defaultStats()
 const rebuiltSummary=randomSummaryDefaults()

 randomPuttHistory.forEach(putt=>{
  const entry=rebuiltStats[putt.distance]
  if(putt.type==="made"){
   entry.made++
   rebuiltSummary.made++
   rebuiltSummary.streak++
   if(rebuiltSummary.streak>rebuiltSummary.bestStreak)rebuiltSummary.bestStreak=rebuiltSummary.streak
   return
  }

  entry.missed++
  if(putt.dir && putt.dir in entry.missDir)entry.missDir[putt.dir]++
  rebuiltSummary.missed++
  rebuiltSummary.streak=0
 })

 randomState.stats=rebuiltStats
 randomState.summary=rebuiltSummary
 randomState.currentDistance=randomCurrentDistance
}

function buildDistanceRow(){
 const row=$("distanceRow")
 row.innerHTML=""
 const activeDistance=currentDistanceValue()

 DISTANCES.forEach(distance=>{
  const button=document.createElement("button")
  const activeClass=distance===activeDistance?" active":""
  button.className="distance-btn"+(appMode==="random"?" random":"")+activeClass
  button.textContent=distance+"'"

  if(appMode==="manual"){
   button.onclick=()=>setDistance(distance)
  }else{
   button.disabled=true
   button.title="Random Mode selects the next distance automatically."
  }

  row.appendChild(button)
 })
}

function setMode(mode){
 appMode=mode
 const modeToggleBtn=$("modeToggleBtn")
 modeToggleBtn.textContent=appMode==="manual"?"Manual Mode On":"Random Mode On"
 modeToggleBtn.classList.toggle("random-on",appMode==="random")

 buildDistanceRow()
 updateStats()
}

function toggleMode(){
 setMode(appMode==="manual"?"random":"manual")
}

function setDistance(distance){
 manualCurrentDistance=distance
 streaks[distance]=0
 saveStreaks()
 buildDistanceRow()
 updateStats()
}

function updateStats(){
 const currentDistance=currentDistanceValue()
 const badge=$("targetBadge")
 const bestRow=$("bestStreakRow")

 $("distanceTitle").textContent=currentDistance+"-Foot Putts"

 if(appMode==="manual"){
  const stat=stats[currentDistance]
  const made=stat.made
  const missed=stat.missed
  const total=made+missed
  const pct=total?Math.round(made/total*100):0
  const streakValue=streaks[currentDistance]||0

  $("made").textContent=made
  $("missed").textContent=missed
  $("percent").textContent=pct
  $("streak").textContent=streakValue
  $("streakLabel").textContent=getStreakEmojis(streakValue)
  bestRow.style.display="none"

  const target=PGA_TOUR_AVG[currentDistance]
  badge.className="badge manual-target "+(pct>=target?"met":"not-met")
  badge.innerHTML=pct>=target
   ? '🏆 Better than PGA Tour Avg!<br>🎯 Target: '+target+'%<span class="manual-total">⛳ Total Putts: '+total+'</span>'
   : '🎯 Target: '+target+'% PGA Tour Avg<span class="manual-total">⛳ Total Putts: '+total+'</span>'
  return
 }

 const made=randomState.summary.made
 const missed=randomState.summary.missed
 const total=made+missed
 const pct=total?Math.round(made/total*100):0

 $("made").textContent=made
 $("missed").textContent=missed
 $("percent").textContent=pct
 $("streak").textContent=randomState.summary.streak
 $("streakLabel").textContent="Random Streak"
 $("bestStreak").textContent=randomState.summary.bestStreak
 bestRow.style.display="block"

 badge.className="badge random random-target"
 badge.innerHTML='🎯 Current Target: '+currentDistance+' feet<span class="random-total">⛳ Total Random Putts: '+total+'</span>'
}

function selectNextRandomDistance(){
 randomCurrentDistance=pickRandomDistance()
 randomState.currentDistance=randomCurrentDistance
}

function recordMade(){
 withTapLock(()=>{
  if(appMode==="manual"){
   const currentDistance=manualCurrentDistance
   stats[currentDistance].made++
   streaks[currentDistance]++

   if(streaks[currentDistance]>bestStreaks[currentDistance]){
    bestStreaks[currentDistance]=streaks[currentDistance]
   }

   manualPuttHistory.push({type:"made",distance:currentDistance})

   flash("flash-green")
   haptic(20)

   saveStats()
   saveStreaks()
   saveBestStreaks()
   updateStats()
   return
  }

  const currentDistance=randomCurrentDistance
  randomState.stats[currentDistance].made++
  randomState.summary.made++
  randomState.summary.streak++
  if(randomState.summary.streak>randomState.summary.bestStreak){
   randomState.summary.bestStreak=randomState.summary.streak
  }

  randomPuttHistory.push({type:"made",distance:currentDistance})

  flash("flash-green")
  haptic(20)

  selectNextRandomDistance()
  saveRandomState()
  buildDistanceRow()
  updateStats()
 })
}

function recordMissed(dir){
 withTapLock(()=>{
  if(appMode==="manual"){
   const currentDistance=manualCurrentDistance
   const stat=stats[currentDistance]

   stat.missed++
   if(dir && stat.missDir && dir in stat.missDir)stat.missDir[dir]++
   streaks[currentDistance]=0

   manualPuttHistory.push({type:"missed",distance:currentDistance,dir})

   flash("flash-red")
   haptic([10,40])

   saveStats()
   saveStreaks()
   saveBestStreaks()
   updateStats()
   return
  }

  const currentDistance=randomCurrentDistance
  const stat=randomState.stats[currentDistance]

  stat.missed++
  if(dir && stat.missDir && dir in stat.missDir)stat.missDir[dir]++

  randomState.summary.missed++
  randomState.summary.streak=0

  randomPuttHistory.push({type:"missed",distance:currentDistance,dir})

  flash("flash-red")
  haptic([10,40])

  selectNextRandomDistance()
  saveRandomState()
  buildDistanceRow()
  updateStats()
 })
}

function summarizeManualSession(){
 let totalMade=0
 let totalMissed=0

 Object.values(stats).forEach(entry=>{
  totalMade+=entry.made
  totalMissed+=entry.missed
 })

 const total=totalMade+totalMissed
 return {
  made:totalMade,
  missed:totalMissed,
  total,
  pct:total?Math.round(totalMade/total*100):0
 }
}

function summarizeRandomSession(){
 const total=randomState.summary.made+randomState.summary.missed
 return {
  made:randomState.summary.made,
  missed:randomState.summary.missed,
  total,
  pct:total?Math.round(randomState.summary.made/total*100):0,
  bestStreak:randomState.summary.bestStreak
 }
}

function newSession(){
 if(!confirm("Start a new session?"))return

 if(appMode==="manual"){
  const summary=summarizeManualSession()
  sessions.push({
   mode:"manual",
   date:new Date().toISOString(),
   stats:deepCopy(stats),
   bestStreaks:deepCopy(bestStreaks),
   summary
  })

  saveSessions()
  resetCurrentTracking()
  buildDistanceRow()
  updateStats()
  renderHistory()
  return
 }

 const summary=summarizeRandomSession()
 sessions.push({
  mode:"random",
  date:new Date().toISOString(),
  stats:deepCopy(randomState.stats),
  bestStreaks:{all:randomState.summary.bestStreak},
  summary
 })

 saveSessions()
 resetRandomTracking()
 buildDistanceRow()
 updateStats()
 renderHistory()
}

function undoPutt(){
 if(appMode==="manual"){
  if(!manualPuttHistory.length)return

  const last=manualPuttHistory.pop()
  manualCurrentDistance=last.distance
  const stat=stats[manualCurrentDistance]

  if(last.type==="made" && stat.made>0){
   stat.made--
   if(streaks[manualCurrentDistance]>0)streaks[manualCurrentDistance]--
  }

  if(last.type==="missed" && stat.missed>0){
   stat.missed--
   if(last.dir && stat.missDir && stat.missDir[last.dir]>0)stat.missDir[last.dir]--
  }

  recomputeStreakStateFromHistory()
  saveStats()
  saveStreaks()
  saveBestStreaks()
  buildDistanceRow()
  updateStats()
  return
 }

 if(!randomPuttHistory.length)return

 const last=randomPuttHistory.pop()
 randomCurrentDistance=last.distance
 recomputeRandomStateFromHistory()
 saveRandomState()
 buildDistanceRow()
 updateStats()
}

function handleHistoryAction(){
 const select=$("historyAction")
 const value=select.value
 select.value=""

 if(value==="delete"){
  if(!confirm("Delete all session history and current tracking stats?"))return
  clearAllTracking()
  buildDistanceRow()
  updateStats()
  renderHistory()
 }

 if(value==="export")exportHistoryCSV()
}

function exportHistoryCSV(){
 if(!sessions.length){alert("No session history to export.");return}

 let csv="Session,Mode,Date,Time,Distance,Made,Missed,Short Left,Long Right,Long Left,Short Right,Total,Make%,PGA Tour Avg %,Delta vs PGA,Streak\n"

 sessions.forEach((session,index)=>{
  const date=new Date(session.date)
  const dateStr=date.toLocaleDateString()
  const timeStr=date.toLocaleTimeString()
  const mode=(session.mode||"manual").toUpperCase()

  DISTANCES.forEach(distance=>{
   const stat=session.stats?.[distance]
   if(!stat)return

   const missDir=stat.missDir||{shortLeft:0,longRight:0,longLeft:0,shortRight:0}
   const total=(stat.made||0)+(stat.missed||0)
   if(!total)return

   const makePct=Math.round((stat.made||0)/total*100)
   const pga=PGA_TOUR_AVG[distance]
   const delta=makePct-pga
   const streakValue=session.mode==="random"?"":(session.bestStreaks?.[distance]||0)

   csv+=(index+1)+","+mode+","+dateStr+","+timeStr+","+distance+","+
        (stat.made||0)+","+(stat.missed||0)+","+
        missDir.shortLeft+","+missDir.longRight+","+missDir.longLeft+","+missDir.shortRight+","+
        total+","+makePct+","+pga+","+delta+","+streakValue+"\n"
  })

  let missTotals={shortLeft:0,longRight:0,longLeft:0,shortRight:0}
  DISTANCES.forEach(distance=>{
   const stat=session.stats?.[distance]
   if(!stat)return
   const missDir=stat.missDir||{}
   missTotals.shortLeft+=(missDir.shortLeft||0)
   missTotals.longRight+=(missDir.longRight||0)
   missTotals.longLeft+=(missDir.longLeft||0)
   missTotals.shortRight+=(missDir.shortRight||0)
  })

  const summary=session.summary||{}
  const totalMiss=summary.missed||0
  const pctSL=totalMiss?Math.round(missTotals.shortLeft/totalMiss*100):0
  const pctLR=totalMiss?Math.round(missTotals.longRight/totalMiss*100):0
  const pctLL=totalMiss?Math.round(missTotals.longLeft/totalMiss*100):0
  const pctSR=totalMiss?Math.round(missTotals.shortRight/totalMiss*100):0
  const formatCount=(count,pct)=>count+" ("+pct+"%)"
  const streakValue=session.mode==="random"?(summary.bestStreak||session.bestStreaks?.all||0):""

  csv+=(index+1)+","+mode+","+dateStr+","+timeStr+",ALL,"+
       (summary.made||0)+","+(summary.missed||0)+","+
       formatCount(missTotals.shortLeft,pctSL)+","+
       formatCount(missTotals.longRight,pctLR)+","+
       formatCount(missTotals.longLeft,pctLL)+","+
       formatCount(missTotals.shortRight,pctSR)+","+
       (summary.total||0)+","+(summary.pct||0)+",,,"+streakValue+"\n\n"
 })

 const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"})
 const anchor=document.createElement("a")
 anchor.href=URL.createObjectURL(blob)
 anchor.download="foreputt_history.csv"
 anchor.click()
}

function renderHistory(){
 const history=$("history")
 history.innerHTML=""

 if(!sessions.length){
  history.innerHTML='<p style="opacity:.8">No sessions yet.</p>'
  return
 }

 sessions.slice().reverse().forEach((session,reverseIndex)=>{
  const index=sessions.length-1-reverseIndex
  const mode=(session.mode||"manual")
  const modeLabel=mode==="random"?"Random":"Manual"

  const wrapper=document.createElement("div")
  wrapper.className="history-wrapper"

  const card=document.createElement("div")
  card.className="history-card"

  const accordion=document.createElement("div")
  accordion.className="accordion"

  const date=new Date(session.date)
  card.innerHTML='<strong>'+modeLabel+' Session '+(index+1)+'</strong><br>'+date.toLocaleDateString()+' - '+(session.summary?.pct||0)+'% ('+(session.summary?.total||0)+' putts)'
  card.onclick=()=>{accordion.style.display=accordion.style.display==="block"?"none":"block"}

  if(mode==="random"){
   const overview=document.createElement("div")
   overview.innerHTML='<strong>Random totals:</strong> '+(session.summary?.made||0)+'/'+(session.summary?.total||0)+' ('+(session.summary?.pct||0)+'%)<br><span class="subtle">Best overall streak: '+(session.summary?.bestStreak||session.bestStreaks?.all||0)+'</span>'
   accordion.appendChild(overview)
  }

  DISTANCES.forEach(distance=>{
   const stat=session.stats?.[distance]
   if(!stat)return

   const total=(stat.made||0)+(stat.missed||0)
   if(!total)return

   const missDir=stat.missDir||{shortLeft:0,longRight:0,longLeft:0,shortRight:0}
   const pct=Math.round((stat.made||0)/total*100)
   const star=pct>=PGA_TOUR_AVG[distance]?" ⭐":""
   const row=document.createElement("div")
   const detailText=mode==="random"
    ? 'Misses - L-Left: '+missDir.longLeft+' | L-Right: '+missDir.longRight+' | S-Left: '+missDir.shortLeft+' | S-Right: '+missDir.shortRight
    : 'Misses - L-Left: '+missDir.longLeft+' | L-Right: '+missDir.longRight+' | S-Left: '+missDir.shortLeft+' | S-Right: '+missDir.shortRight+' | Best streak: '+(session.bestStreaks?.[distance]||0)

   row.innerHTML='<strong>'+distance+' ft:</strong> '+(stat.made||0)+'/'+total+' ('+pct+'%) - PGA '+PGA_TOUR_AVG[distance]+'%'+star+
    '<br><span class="subtle">'+detailText+'</span>'
   accordion.appendChild(row)
  })

  const deleteButton=document.createElement("button")
  deleteButton.textContent="🗑️ Delete Session"
  deleteButton.style.background="#E34234"
  deleteButton.style.padding="6px 10px"
  deleteButton.style.width="100%"
  deleteButton.style.fontSize="20px"
  deleteButton.style.fontWeight="800"
  deleteButton.style.border="none"
  deleteButton.style.borderRadius="12px"
  deleteButton.style.marginTop="12px"
  deleteButton.style.boxShadow="0 6px 0 #b03026,0 14px 22px rgba(0,0,0,.45)"

  deleteButton.onclick=(event)=>{
   event.stopPropagation()
   if(!confirm("Delete this session?"))return
   sessions.splice(index,1)
   saveSessions()
   renderHistory()
  }

  accordion.appendChild(deleteButton)
  wrapper.appendChild(card)
  wrapper.appendChild(accordion)
  history.appendChild(wrapper)
 })
}

function initApp(){
 stats=loadStats()
 streaks=loadStreaks()
 bestStreaks=loadBestStreaks()
 randomState=loadRandomState()
 sessions=loadSessions()

 manualCurrentDistance=DISTANCES[0]
 randomCurrentDistance=randomState.currentDistance

 buildDistanceRow()
 updateStats()
 renderHistory()
}

if(document.readyState==="loading"){
 document.addEventListener("DOMContentLoaded",initApp)
}else{
 initApp()
}

</script>
