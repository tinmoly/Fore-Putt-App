<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fore!Putt Practice App — Version 1.11</title>

<style>
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0b3d2e;color:#fff;margin:0;padding:20px}
body.flash-green{animation:flashGreen .15s ease-in-out}
body.flash-red{animation:flashRed .15s ease-in-out}

@keyframes flashGreen{from{background:#0b3d2e}to{background:#145a43}}
@keyframes flashRed{from{background:#0b3d2e}to{background:#6b2a2a}}

.card{background:#145a43;border-radius:14px;padding:20px;max-width:460px;margin:0 auto;box-shadow:0 10px 25px rgba(0,0,0,.3)}
h1,h3{text-align:center;margin-bottom:10px}

.distance-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px}
.distance-btn{background:#1c7c5b;border:none;padding:10px 20px;border-radius:999px;font-weight:800;color:#fff;cursor:pointer;white-space:nowrap;font-size:24px}
.distance-btn.active{background:#2ecc71;color:#000}

/* Circular Made/Missed control */
.putt-ring{width:260px;height:260px;border-radius:50%;background:#E34234;display:flex;align-items:center;justify-content:center;box-shadow:6px 0 0 #b03026,0 6px 0 #b03026,0 18px 32px rgba(0,0,0,.45);cursor:pointer;margin:10px auto;position:relative}

.made-inner{width:120px;height:120px;border-radius:50%;background:#2ecc71;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#000;box-shadow:3px 0 0 #1e9e54,0 3px 0 #1e9e54,0 10px 20px rgba(0,0,0,.35);border-bottom:3px solid #1e9e54;border-right:3px solid #1e9e54;cursor:pointer;text-align:center;line-height:1.1}

.made-inner:active{transform:translateY(3px) scale(.97);box-shadow:1px 0 0 #1e9e54,0 1px 0 #1e9e54,0 6px 12px rgba(0,0,0,.35)}

.putt-ring.missed-press{transform:translateY(3px) scale(.98);box-shadow:1px 0 0 #b03026,0 1px 0 #b03026,0 6px 12px rgba(0,0,0,.35)}
.putt-ring.missed-pulse{animation:redPulse .35s ease-out}

@keyframes redPulse{
0%{box-shadow:0 0 0 0 rgba(227,66,52,.7),3px 0 0 #b03026,0 3px 0 #b03026,0 10px 20px rgba(0,0,0,.35)}
70%{box-shadow:0 0 0 16px rgba(227,66,52,0),3px 0 0 #b03026,0 3px 0 #b03026,0 10px 20px rgba(0,0,0,.35)}
100%{box-shadow:0 0 0 0 rgba(227,66,52,0),3px 0 0 #b03026,0 3px 0 #b03026,0 10px 20px rgba(0,0,0,.35)}
}

.missed-label{font-weight:800;font-size:22px;color:#000;pointer-events:none;position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;line-height:1.1}

.stats{text-align:center;font-size:18px;margin-top:20px}
.stats p{margin:6px 0;text-align:center}
.badge{margin-top:10px;padding:10px;border-radius:10px;text-align:center;background:#0e4f3a}
.badge.met{background:#1f7a4a}
.badge.not-met{background:#6b2a2a}

.history-card{padding:10px;background:#1c7c5b;border-radius:10px;cursor:pointer}
.history-wrapper{margin-bottom:10px}
.accordion{display:none;margin-top:8px;padding:10px;background:#0e4f3a;border-radius:10px}
.subtle{opacity:.75;font-size:14px;margin-left:6px}

.logo-wrap{text-align:center;margin-bottom:10px}
.app-logo{max-width:240px;width:100%;height:auto}

.splash{position:fixed;inset:0;background:#0b3d2e;display:flex;align-items:center;justify-content:center;z-index:9999}
.splash.hidden{opacity:0;pointer-events:none;transition:opacity .6s ease}
.splash-inner{position:relative;width:360px}
.splash-logo{width:100%;display:block}
</style>
</head>

<body>

<div class="splash" id="splash" style="display:none">
<div class="splash-inner">
<img src="splash-logo.png" class="splash-logo" alt="Fore!Putt" />
</div>
</div>

<div class="card">

<div class="logo-wrap">
<img src="foreputt-logo.png" alt="Fore!Putt Logo" class="app-logo" />
</div>

<h1 id="distanceTitle">2-Foot Putts</h1>
<div id="distanceRow" class="distance-row"></div>

<div style="display:flex;flex-direction:column;align-items:center;">
<div class="putt-ring" onclick="recordMissed()">
<div class="made-inner" onclick="event.stopPropagation();recordMade();">Made<br>✅</div>
<div class="missed-label">Missed<br>⛔</div>
</div>
</div>

<div class="stats">
<p>Made: <span id="made">0</span> | Missed: <span id="missed">0</span></p>
<p>⛳ Make %: <span id="percent">0</span>%</p>
<p><span id="streakLabel">Streak</span>: <span id="streak">0</span></p>
</div>

<div id="targetBadge" class="badge"></div>

<div style="display:flex;justify-content:space-between;gap:16px;margin-top:10px;width:100%;">
<button onclick="newSession()" style="flex:1;background:#0096FF;color:#000;padding:6px 10px;font-size:20px;font-weight:800;font-family:inherit;border:none;border-radius:12px;box-shadow:0 6px 0 #0074c7,0 14px 22px rgba(0,0,0,.45);cursor:pointer;">🔄 New Session</button>
<button onclick="undoPutt()" style="flex:1;background:#8a8a8a;color:#000;padding:6px 10px;font-size:20px;font-weight:800;font-family:inherit;border:none;border-radius:12px;box-shadow:0 6px 0 #666666,0 14px 22px rgba(0,0,0,.45);cursor:pointer;">↩️ Undo Last Putt</button>
</div>

<div style="display:flex;justify-content:space-between;align-items:center;margin-top:18px">
<h3 style="margin:0">Session History</h3>
<select id="historyAction" onchange="handleHistoryAction()" style="background:#1c7c5b;color:#fff;border:none;border-radius:8px;padding:6px 8px;font-weight:700">
<option value="">Actions</option>
<option value="export">Export All History</option>
<option value="delete">Clear All History</option>
</select>
</div>

<div id="history"></div>

</div>

<script>

const DISTANCES=[2,3,4,5,6,7,8,9,10,15,20,30]
const PGA_TOUR_AVG={2:99,3:96,4:88,5:77,6:66,7:58,8:50,9:45,10:40,15:23,20:15,30:7}

let currentDistance=2
let stats
let streaks
let bestStreaks
let sessions
let puttHistory=[]

const $=id=>document.getElementById(id)

let tapLocked=false
const TAP_DELAY=300

function withTapLock(fn){
if(tapLocked)return
 tapLocked=true
 fn()
 setTimeout(()=>tapLocked=false,TAP_DELAY)
}

function flash(cls){
document.body.classList.add(cls)
setTimeout(()=>document.body.classList.remove(cls),150)
}

function haptic(ms){if(navigator.vibrate)navigator.vibrate(ms)}

function getStreakEmojis(v){
if(v>=10)return"🔥🔥🔥🔥🔥"
if(v>=7)return"🔥🔥🔥🔥"
if(v>=5)return"🔥🔥🔥"
if(v>=3)return"🔥🔥"
if(v>=1)return"🔥"
return""
}

function defaultStats(){
let o={}
DISTANCES.forEach(d=>o[d]={made:0,missed:0})
return o
}

function loadStats(){return JSON.parse(localStorage.getItem("puttingStats"))||defaultStats()}
function saveStats(){localStorage.setItem("puttingStats",JSON.stringify(stats))}

function loadStreaks(){
let s=JSON.parse(localStorage.getItem("puttingStreaks"))||{}
let o={}
DISTANCES.forEach(d=>o[d]=s[d]||0)
return o
}

function saveStreaks(){localStorage.setItem("puttingStreaks",JSON.stringify(streaks))}

function defaultBestStreaks(){
let o={}
DISTANCES.forEach(d=>o[d]=0)
return o
}

function loadSessions(){return JSON.parse(localStorage.getItem("puttingSessions"))||[]}
function saveSessions(){localStorage.setItem("puttingSessions",JSON.stringify(sessions))}

function buildDistanceRow(){
const r=$("distanceRow")
if(!r)return

r.innerHTML=""

DISTANCES.forEach(d=>{
const b=document.createElement("button")
b.className="distance-btn"+(d===currentDistance?" active":"")
b.textContent=d+"'"
b.onclick=()=>setDistance(d)
r.appendChild(b)
})
}

function setDistance(d){
currentDistance=d
streaks[d]=0
saveStreaks()

const title=$("distanceTitle")
if(title)title.textContent=d+"-Foot Putts"

buildDistanceRow()
updateStats()
}

function updateStats(){
if(!$("made"))return

let made=stats[currentDistance].made
let missed=stats[currentDistance].missed
let total=made+missed
let pct=total?Math.round(made/total*100):0

$("made").textContent=made
$("missed").textContent=missed
$("percent").textContent=pct

let s=streaks[currentDistance]||0
$("streak").textContent=s
$("streakLabel").textContent=(getStreakEmojis(s)+" Streak").trim()

let target=PGA_TOUR_AVG[currentDistance]
let badge=$("targetBadge")

badge.className="badge "+(pct>=target?"met":"not-met")

badge.innerHTML=pct>=target
?"🏆 Better than PGA Tour Avg!<br>🎯 Target: "+target+"%"
:"🎯 Target: "+target+"% PGA Tour Avg"
}

function recordMade(){
withTapLock(()=>{
stats[currentDistance].made++
streaks[currentDistance]++

if(streaks[currentDistance]>bestStreaks[currentDistance]){
bestStreaks[currentDistance]=streaks[currentDistance]
}

puttHistory.push({type:"made",distance:currentDistance})

flash("flash-green")
haptic(20)

saveStats()
saveStreaks()
updateStats()
})
}

function recordMissed(){
withTapLock(()=>{
stats[currentDistance].missed++
streaks[currentDistance]=0

puttHistory.push({type:"missed",distance:currentDistance})

const ring=document.querySelector(".putt-ring")

if(ring){
ring.classList.remove("missed-pulse","missed-press")
void ring.offsetWidth
ring.classList.add("missed-press")
ring.classList.add("missed-pulse")
setTimeout(()=>ring.classList.remove("missed-press"),120)
}

flash("flash-red")
haptic([10,40])

saveStats()
saveStreaks()
updateStats()
})
}

function newSession(){
if(!confirm("Start a new session?"))return

let totalMade=0
let totalMissed=0

Object.values(stats).forEach(d=>{
totalMade+=d.made
 totalMissed+=d.missed
})

let totalPutts=totalMade+totalMissed
let overallPct=totalPutts?Math.round(totalMade/totalPutts*100):0

sessions.push({
 date:new Date().toISOString(),
 stats:JSON.parse(JSON.stringify(stats)),
 bestStreaks:JSON.parse(JSON.stringify(bestStreaks)),
 summary:{made:totalMade,missed:totalMissed,total:totalPutts,pct:overallPct}
})

saveSessions()

stats=defaultStats()
streaks={}
DISTANCES.forEach(d=>streaks[d]=0)
saveStreaks()

bestStreaks=defaultBestStreaks()
puttHistory=[]

updateStats()
renderHistory()
}

function undoPutt(){
if(!puttHistory.length)return

let last=puttHistory.pop()
currentDistance=last.distance

if(last.type==="made"&&stats[currentDistance].made>0){
stats[currentDistance].made--
if(streaks[currentDistance]>0)streaks[currentDistance]--
}

if(last.type==="missed"&&stats[currentDistance].missed>0){
stats[currentDistance].missed--
}

saveStats()
saveStreaks()
updateStats()
}

function handleHistoryAction(){
const sel=$("historyAction")
if(!sel)return

const v=sel.value
sel.value=""

if(v==="delete"){
if(!confirm("Delete all session history?"))return
sessions=[]
saveSessions()
renderHistory()
}

if(v==="export"){
exportHistoryCSV()
}
}

function exportHistoryCSV(){
if(!sessions.length){
alert("No session history to export.")
return
}

let csv="Session,Date,Time,Distance,Made,Missed,Total,Make%,PGA Tour Avg %,Delta vs PGA,Streak\n"

sessions.forEach((s,i)=>{
const d=new Date(s.date)
const dateStr=d.toLocaleDateString()
const timeStr=d.toLocaleTimeString()

DISTANCES.forEach(dist=>{
const st=s.stats[dist]
const total=st.made+st.missed
if(!total)return

const makePct=Math.round(st.made/total*100)
const pga=PGA_TOUR_AVG[dist]
const delta=makePct-pga

csv+=(i+1)+","+dateStr+","+timeStr+","+dist+","+
st.made+","+st.missed+","+total+","+
makePct+","+pga+","+delta+","+
(s.bestStreaks[dist]||0)+"\n"
})

csv+=(i+1)+","+dateStr+","+timeStr+",SUMMARY,"+
s.summary.made+","+s.summary.missed+","+
s.summary.total+","+s.summary.pct+",,,\n"
})

const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"})
const a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="foreputt_history.csv"
a.click()
}

function renderHistory(){
const h=$("history")
if(!h)return

h.innerHTML=""

if(!sessions.length){
h.innerHTML='<p style="opacity:.8">No sessions yet.</p>'
return
}

sessions.slice().reverse().forEach((s,i)=>{
const idx=sessions.length-1-i

const wrap=document.createElement("div")
wrap.className="history-wrapper"

const card=document.createElement("div")
card.className="history-card"

const acc=document.createElement("div")
acc.className="accordion"

card.innerHTML='<strong>Session '+(idx+1)+'</strong><br>'+new Date(s.date).toLocaleDateString()+' • '+s.summary.pct+'% ('+s.summary.total+' putts)'

card.onclick=()=>{
acc.style.display=acc.style.display==='block'?'none':'block'
}

DISTANCES.forEach(d=>{
const st=s.stats[d]
const tot=st.made+st.missed
if(!tot)return

const p=Math.round(st.made/tot*100)
const star=p>=PGA_TOUR_AVG[d]?' ⭐':''

const row=document.createElement("div")
row.innerHTML='<strong>'+d+' ft:</strong> '+st.made+'/'+tot+' ('+p+'%) — PGA '+PGA_TOUR_AVG[d]+'%'+star+'<br><span class="subtle">Best streak: '+(s.bestStreaks[d]||0)+'</span>'

acc.appendChild(row)
})

const del=document.createElement("button")
del.textContent="🗑️ Delete Session"
del.style.background="#E34234"
del.style.padding="6px 10px"
del.style.width="100%"
del.style.display="block"
del.style.textAlign="center"
del.style.fontSize="20px"
del.style.fontWeight="800"
del.style.fontFamily="inherit"
del.style.border="none"
del.style.borderRadius="12px"
del.style.marginTop="12px"
del.style.boxShadow="0 6px 0 #b03026,0 14px 22px rgba(0,0,0,.45)"
del.style.cursor="pointer"

del.onclick=(e)=>{
e.stopPropagation()
if(!confirm("Delete this session?"))return
sessions.splice(idx,1)
saveSessions()
renderHistory()
}

acc.appendChild(del)
wrap.appendChild(card)
wrap.appendChild(acc)
h.appendChild(wrap)
})
}

function initApp(){
stats=loadStats()
streaks=loadStreaks()
bestStreaks=defaultBestStreaks()
sessions=loadSessions()

buildDistanceRow()
updateStats()
renderHistory()
}

if(document.readyState==='loading'){
document.addEventListener('DOMContentLoaded',initApp)
}else{
initApp()
}

</script>

</body>
</html>
